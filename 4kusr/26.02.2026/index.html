<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>26.02.2026</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div class="box">
  <div class="infoc">
    <div class="info-row">
      <div class="card">
        <i class="fa-solid fa-location-dot"></i>
        <p class="ctitle">OUR MAIN OFFICE</p>
        <p class="ctext">SoHo 94 Broadway St<br>New York, NY 1001</p>
      </div>
      <div class="card">
        <i class="fa-solid fa-phone"></i>
        <p class="ctitle">PHONE NUMBER</p>
        <p class="ctext">234-9876-5400<br>888-0123-4567 (Toll Free)</p>
      </div>
    </div>
    <div class="info-row">
      <div class="card">
        <i class="fa-solid fa-fax"></i>
        <p class="ctitle">FAX</p>
        <p class="ctext">1-234-567-8900</p>
      </div>
      <div class="card">
        <i class="fa-solid fa-envelope"></i>
        <p class="ctitle">EMAIL</p>
        <p class="ctext"><a href="mailto:hello@theme.com">hello@theme.com</a></p>
      </div>
    </div>
  </div>

  <div class="form">
    <h1>Contact Us</h1>
    <input type="text" placeholder="Enter your Name" />
    <input type="email" placeholder="Enter a valid email address" />
    <textarea placeholder="Your message…"></textarea>
    <button type="button">Submit</button>
  </div>

</div>

</body>
</html>
